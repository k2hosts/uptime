name: Health Check

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # allow manual trigger from Actions tab

permissions:
  contents: write              # needed to commit status.json back to repo

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run health checks
        id: checks
        run: |
          node - <<'EOF'
          const fs   = require('fs');
          const https = require('https');
          const http  = require('http');

          // ── CONFIG ────────────────────────────────────────────────────────
          const SERVICES = [
            {
              id:     'playground',
              name:   'BareAI Playground',
              url:    'https://bareai.oops.wtf',
              method: 'GET',
              // Playground returns 200 on a normal page load
              expectedStatus: [200, 301, 302],
            },
            {
              id:     'worker',
              name:   'BareAI API Worker',
              url:    'https://oops-proxy.deandre6156.workers.dev',
              method: 'POST',
              body:   JSON.stringify({ messages: [] }),
              headers: { 'Content-Type': 'application/json' },
              // Worker returns 401 (missing_key) which means it's alive and responding
              expectedStatus: [401, 405],
            },
          ];

          // Keep 7 days of 10-minute checks = 1008 entries max per service
          const MAX_HISTORY = 1008;

          // ── HELPERS ───────────────────────────────────────────────────────
          function request(service) {
            return new Promise((resolve) => {
              const url     = new URL(service.url);
              const lib     = url.protocol === 'https:' ? https : http;
              const start   = Date.now();
              const timeout = setTimeout(() => resolve({ ok: false, status: 0, latency: null }), 10000);

              const options = {
                hostname: url.hostname,
                port:     url.port || (url.protocol === 'https:' ? 443 : 80),
                path:     url.pathname + url.search,
                method:   service.method || 'GET',
                headers:  service.headers || {},
                timeout:  9000,
              };

              const req = lib.request(options, (res) => {
                clearTimeout(timeout);
                res.resume(); // drain body
                const latency = Date.now() - start;
                const ok      = service.expectedStatus
                  ? service.expectedStatus.includes(res.statusCode)
                  : res.statusCode < 500;
                resolve({ ok, status: res.statusCode, latency });
              });

              req.on('error', () => { clearTimeout(timeout); resolve({ ok: false, status: 0, latency: null }); });
              req.on('timeout', () => { req.destroy(); clearTimeout(timeout); resolve({ ok: false, status: 0, latency: null }); });

              if (service.body) req.write(service.body);
              req.end();
            });
          }

          // ── MAIN ──────────────────────────────────────────────────────────
          (async () => {
            const now      = new Date().toISOString();
            const existing = JSON.parse(fs.readFileSync('status.json', 'utf8'));

            // Build a lookup of existing history keyed by service id
            const historyMap = {};
            for (const svc of existing.services) {
              historyMap[svc.id] = svc.history || [];
            }

            const results = [];
            for (const service of SERVICES) {
              const { ok, status, latency } = await request(service);

              const entry = {
                ts:      now,
                ok,
                status,
                latency,
              };

              // Prepend latest, trim to max history
              const history = [entry, ...(historyMap[service.id] || [])].slice(0, MAX_HISTORY);

              results.push({
                id:      service.id,
                name:    service.name,
                url:     service.url,
                status:  ok ? 'operational' : 'down',
                latency: latency,
                history,
              });

              console.log(`[${ok ? 'OK' : 'DOWN'}] ${service.name} — HTTP ${status} — ${latency ?? 'timeout'}ms`);
            }

            const output = {
              generated: now,
              services:  results,
            };

            fs.writeFileSync('status.json', JSON.stringify(output, null, 2));
            console.log('status.json updated.');
          })();
          EOF

      - name: Commit status.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: health check $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
