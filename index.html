<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status — BareAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #ffffff;
      --surface:   #f8f8f9;
      --surface2:  #f1f1f4;
      --border:    #e4e4e9;
      --border2:   #d0d0d8;
      --text:      #0f0f14;
      --text2:     #3a3a46;
      --muted:     #7a7a8c;
      --muted2:    #9a9aac;
      --accent:    #5A0F85;
      --accent-lt: #7a1fb5;
      --accent-bg: #f5eefb;
      --green:     #16a34a;
      --green-bg:  #f0fdf4;
      --green-bd:  #bbf7d0;
      --green-muted: #dcfce7;
      --red:       #dc2626;
      --red-bg:    #fef2f2;
      --red-bd:    #fecaca;
      --amber:     #d97706;
      --amber-bg:  #fffbeb;
      --amber-bd:  #fde68a;
      --blue:      #2563eb;
      --blue-bg:   #eff6ff;
      --blue-bd:   #bfdbfe;
      --sans: 'Figtree', sans-serif;
      --mono: 'DM Mono', monospace;
    }
    html.dark {
      --bg:        #0d0d10;
      --surface:   #141418;
      --surface2:  #1c1c22;
      --border:    #26262e;
      --border2:   #32323c;
      --text:      #f0eff4;
      --text2:     #b8b6c4;
      --muted:     #6e6d7a;
      --muted2:    #55545f;
      --accent:    #9b4dca;
      --accent-lt: #b468e0;
      --accent-bg: #1e1028;
      --green:     #4ade80;
      --green-bg:  #0a1f12;
      --green-bd:  #14532d;
      --green-muted: #052e16;
      --red:       #f87171;
      --red-bg:    #1a0505;
      --red-bd:    #7f1d1d;
      --amber:     #fbbf24;
      --amber-bg:  #1a0e00;
      --amber-bd:  #78350f;
      --blue:      #60a5fa;
      --blue-bg:   #0a1628;
      --blue-bd:   #1e3a5f;
    }
    html { color-scheme: light; }
    html.dark { color-scheme: dark; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; min-height: 100vh; }

    /* ── NAV ── */
    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); position: sticky; top: 0; z-index: 10;
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .nav-logo { font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none; letter-spacing: -0.02em; }
    .nav-badge { font-size: 11px; font-weight: 500; background: var(--accent-bg); color: var(--accent); padding: 2px 8px; border-radius: 100px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-link { font-size: 12px; color: var(--muted); text-decoration: none; font-weight: 500; transition: color 0.15s; }
    .nav-link:hover { color: var(--accent); }
    .theme-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; color: var(--muted); transition: color 0.15s; }
    .theme-btn:hover { color: var(--text); }
    .icon-sun { display: none; } .icon-moon { display: block; }
    html.dark .icon-sun { display: block; } html.dark .icon-moon { display: none; }

    /* ── LAYOUT ── */
    main { max-width: 680px; margin: 0 auto; padding: 52px 24px 80px; }

    /* ── BANNER ── */
    .banner {
      display: flex; align-items: center; gap: 16px;
      padding: 22px 24px; border-radius: 14px; margin-bottom: 48px;
      border: 1px solid var(--border); background: var(--surface);
      transition: all 0.3s;
    }
    .banner.all-ok   { background: var(--green-bg);  border-color: var(--green-bd); }
    .banner.has-down    { background: var(--red-bg);    border-color: var(--red-bd); }
    .banner.maintenance { background: var(--blue-bg);  border-color: var(--blue-bd); }
    .banner-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--muted2); flex-shrink: 0;
    }
    .all-ok  .banner-dot { background: var(--green); box-shadow: 0 0 0 3px var(--green-muted); animation: pulse 2.5s infinite; }
    .has-down .banner-dot    { background: var(--red); }
    .maintenance .banner-dot { background: var(--blue); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .banner-body { flex: 1; }
    .banner-title { font-size: 15px; font-weight: 500; color: var(--text); letter-spacing: -0.02em; }
    .banner-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .banner-time { font-size: 11px; color: var(--muted2); font-family: var(--mono); flex-shrink: 0; }

    /* ── SECTION ── */
    .section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted2);
      margin-bottom: 10px;
    }

    /* ── SERVICE CARD ── */
    .card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 22px; margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--border2); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .card-name { font-size: 14px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; }
    .card-url  { font-size: 11px; color: var(--muted2); font-family: var(--mono); margin-top: 3px; }

    .status-pill {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 500; padding: 4px 10px;
      border-radius: 100px; border: 1px solid;
      flex-shrink: 0;
    }
    .status-pill.operational { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }
    .status-pill.down        { background: var(--red-bg);   border-color: var(--red-bd);   color: var(--red); }
    .status-pill.unknown      { background: var(--surface2); border-color: var(--border);   color: var(--muted); }
    .status-pill.maintenance  { background: var(--blue-bg);  border-color: var(--blue-bd);  color: var(--blue); }
    .pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    /* ── STAT PILLS ── */
    .stats { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .stat {
      font-size: 11px; font-family: var(--mono);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); padding: 3px 10px; border-radius: 100px;
    }
    .stat strong { color: var(--text2); font-weight: 500; }

    /* ── HISTORY BARS ── */
    .history { margin-bottom: 14px; }
    .bars {
      display: flex; gap: 2px; align-items: flex-end;
      height: 32px; margin-bottom: 6px; overflow: hidden;
    }
    .bar {
      flex: 1; border-radius: 2px; min-width: 2px;
      height: 32px;
      cursor: default; transition: opacity 0.15s;
    }
    .bar.ok      { background: var(--green); opacity: 0.65; }
    .bar.ok:hover { opacity: 1; }
    .bar.down    { background: var(--red); opacity: 0.9; }
    .bar.down:hover { opacity: 1; }
    .bar.partial { background: var(--amber); opacity: 0.8; }
    .bar.partial:hover { opacity: 1; }
    .bar.empty       { background: var(--border); opacity: 0.35; }
    .bar.maintenance { background: var(--blue); opacity: 0.7; }
    .bar.maintenance:hover { opacity: 1; }
    .bars-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted2); font-family: var(--mono);
    }

    /* ── UPTIME ROW ── */
    .uptime-row {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 14px; border-top: 1px solid var(--border);
    }
    .uptime-label { font-size: 12px; color: var(--muted); }
    .uptime-pct   { font-size: 12px; font-weight: 500; font-family: var(--mono); }
    .uptime-pct.high   { color: var(--green); }
    .uptime-pct.medium { color: var(--amber); }
    .uptime-pct.low    { color: var(--red); }
    .uptime-pct.none   { color: var(--muted2); }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 28px 24px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--muted2); font-family: var(--mono);
      display: flex; align-items: center; justify-content: center; gap: 16px;
    }
    footer a { color: var(--accent); text-decoration: none; }
    .footer-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border2); }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="https://bareai.oops.wtf" class="nav-logo">BareAI</a>
    <span class="nav-badge">status</span>
  </div>
  <div class="nav-right">
    <a href="https://bareai.oops.wtf/playground" class="nav-link">Playground →</a>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
      <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</nav>

<main>
  <div class="banner loading" id="banner">
    <div class="banner-dot"></div>
    <div class="banner-body">
      <div class="banner-title" id="banner-title">Checking systems…</div>
      <div class="banner-sub" id="banner-sub">Loading status data</div>
    </div>
    <div class="banner-time" id="banner-time"></div>
  </div>

  <div class="section-label">Services</div>
  <div id="services"></div>
</main>

<footer>
  <span>Checks every minute</span>
  <div class="footer-dot"></div>
  <span><a href="https://bareai.oops.wtf">bareai.oops.wtf</a></span>
  <div class="footer-dot"></div>
  <span id="footer-time"></span>
</footer>

<script>
  // ── THEME ─────────────────────────────────────────────
  (function() {
    if (localStorage.getItem('bareai-theme') !== 'light') document.documentElement.classList.add('dark');
  })();
  function toggleTheme() {
    const d = document.documentElement.classList.toggle('dark');
    localStorage.setItem('bareai-theme', d ? 'dark' : 'light');
  }

  // ── HELPERS ───────────────────────────────────────────
  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const s = Math.floor(diff / 1000);
    if (s < 10)  return 'just now';
    if (s < 60)  return `${s}s ago`;
    const m = Math.floor(s / 60);
    if (m < 60)  return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24)  return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }

  function fmt(ms) { return ms != null ? ms + 'ms' : '—'; }

  function uptimePct(history) {
    if (!history?.length) return null;
    return ((history.filter(h => h.ok).length / history.length) * 100).toFixed(2);
  }

  function uptimeClass(pct) {
    if (pct === null) return 'none';
    const n = parseFloat(pct);
    if (n >= 99) return 'high';
    if (n >= 95) return 'medium';
    return 'low';
  }

  // ── HISTORY BARS ──────────────────────────────────────
  function buildBars(history) {
    const MAX_BARS    = 168; // 7 days × 24 hourly buckets
    const BUCKET_SIZE = Math.max(1, Math.ceil(history.length / MAX_BARS));

    const buckets = [];
    for (let i = 0; i < history.length; i += BUCKET_SIZE) {
      const slice = history.slice(i, i + BUCKET_SIZE);
      const ok    = slice.filter(e => e.ok).length;
      const total = slice.length;
      buckets.push({
        allOk:   ok === total,
        anyOk:   ok > 0,
        sample:  slice[0],
        slice,
      });
    }

    const padded = [
      ...Array(Math.max(0, MAX_BARS - buckets.length)).fill(null),
      ...buckets.reverse(),
    ];

    return padded.map(b => {
      if (!b) return `<div class="bar empty" title="No data"></div>`;
      const allMaintenance = slice.every(e => e.maintenance);
      const cls   = allMaintenance ? 'maintenance' : b.allOk ? 'ok' : b.anyOk ? 'partial' : 'down';
      const label = b.allOk
        ? `Operational — ${fmt(b.sample?.latency)}`
        : b.anyOk ? 'Partial outage'
        : `Down — HTTP ${b.sample?.status || 'timeout'}`;
      return `<div class="bar ${cls}" title="${label}"></div>`;
    }).join('');
  }

  // ── RENDER SERVICE ────────────────────────────────────
  function renderService(svc) {
    const pct       = uptimePct(svc.history);
    const statusCls = svc.status || 'unknown';
    const statusTxt = { operational: 'Operational', down: 'Down', unknown: 'Unknown', maintenance: 'Maintenance' }[statusCls] || 'Unknown';
    const latency   = svc.history?.[0]?.latency ?? svc.latency;

    return `
      <div class="card">
        <div class="card-top">
          <div>
            <div class="card-name">${svc.name}</div>
            ${svc.public_url !== false ? `<div class="card-url">${svc.url}</div>` : ''}
          </div>
          <div class="status-pill ${statusCls}">
            <div class="pill-dot"></div>
            ${statusTxt}
          </div>
        </div>

        <div class="stats">
          <div class="stat">Latency <strong>${fmt(latency)}</strong></div>
          <div class="stat">Checks <strong>${svc.history?.length ?? 0}</strong></div>
        </div>

        <div class="history">
          <div class="bars">${buildBars(svc.history || [])}</div>
          <div class="bars-labels"><span>7 days ago</span><span>now</span></div>
        </div>

        <div class="uptime-row">
          <span class="uptime-label">7-day uptime</span>
          <span class="uptime-pct ${uptimeClass(pct)}">${pct !== null ? pct + '%' : '—'}</span>
        </div>
      </div>`;
  }

  // ── RENDER BANNER ─────────────────────────────────────
  function renderBanner(services, generated) {
    const anyDown = services.some(s => s.status === 'down');
    const allOk   = services.every(s => s.status === 'operational');
    const banner  = document.getElementById('banner');

    const anyMaintenance = services.some(s => s.status === 'maintenance');
    banner.className = 'banner ' + (anyDown ? 'has-down' : anyMaintenance ? 'maintenance' : allOk ? 'all-ok' : '');
    document.getElementById('banner-title').textContent = anyDown
      ? 'Some systems are experiencing issues'
      : anyMaintenance ? 'Scheduled maintenance in progress'
      : allOk ? 'All systems operational' : 'Status unknown';
    document.getElementById('banner-sub').textContent = anyDown
      ? services.filter(s => s.status === 'down').map(s => s.name).join(', ') + ' — investigating'
      : anyMaintenance ? services.filter(s => s.status === 'maintenance').map(s => s.name).join(', ') + ' — back soon'
      : 'Everything is running smoothly.';

    if (generated && generated !== '1970-01-01T00:00:00.000Z') {
      document.getElementById('banner-time').textContent = timeAgo(generated);
      document.getElementById('footer-time').textContent = 'Updated ' + timeAgo(generated);
    }
  }

  // ── LOAD ──────────────────────────────────────────────
  async function load() {
    try {
      const res  = await fetch('status.json?t=' + Date.now());
      const data = await res.json();
      renderBanner(data.services, data.generated);
      document.getElementById('services').innerHTML = data.services.map(renderService).join('');
      setTimeout(load, 60 * 1000);
    } catch (err) {
      document.getElementById('banner-title').textContent = 'Could not load status data';
      document.getElementById('banner-sub').textContent   = 'Try refreshing the page';
      console.error(err);
    }
  }

  load();
</script>
</body>
</html>
